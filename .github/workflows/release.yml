name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is intentionally excluded — Cerebro's Python backend
        # doesn't have a Windows bundle path yet (bundle-python.sh skips
        # on Windows runners). Add windows-latest back once the backend
        # supports it.
        os: [macos-latest, ubuntu-latest]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Verify the pushed tag matches package.json's version. If they
      # disagree, Forge's GitHub publisher creates a release named after
      # package.json — so the artifacts ship with version X but the tag is
      # at version Y, and the in-app updater sees its own running version
      # as still "behind" forever. Fail loud instead.
      - name: Verify tag matches package.json version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: $PKG_VERSION"
          echo "git tag version:      $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION."
            echo "::error::Bump package.json before tagging, or retag at the right commit."
            exit 1
          fi

      # Linux makers need: fakeroot + dpkg (deb), rpm (rpm), mksquashfs
      # (AppImage). bundle-python.sh shells out to rsync + sha256sum (both
      # in Ubuntu's coreutils). build-essential + python3-dev cover
      # node-pty's source build (no Linux prebuild ships with the package).
      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fakeroot dpkg rpm squashfs-tools \
            build-essential python3 python3-dev rsync

      # uv (Astral's Python manager) is required by scripts/bundle-python.sh,
      # which the generateAssets hook in forge.config.ts runs to build the
      # relocatable CPython 3.11 + backend deps that ship in the .app/.deb/
      # .rpm/.AppImage.
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      # appdmg's transitive native deps (fs-xattr, macos-alias) sometimes
      # ship without prebuilt binaries for arm64 macOS runners; force a
      # source rebuild so the DMG maker doesn't crash later.
      - name: Rebuild macOS DMG native deps
        if: runner.os == 'macOS'
        run: npm rebuild fs-xattr macos-alias

      # Import the Developer ID Application certificate into a temporary
      # keychain so codesign + osx-sign can find it during postPackage.
      # The .p12 is held as a base64-encoded repo secret. We unlock the
      # keychain for the duration of the job and add it to the search
      # list, then forge.config.ts's findDeveloperIdIdentity() will see
      # the cert, sign the .app, and notarize it via the env credentials
      # set on the publish step below.
      - name: Set up macOS code-signing keychain
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12_BASE64 != ''
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          # Decode + write the cert
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          # Create + unlock the keychain (long timeout so it stays unlocked
          # for the entire build/sign/notarize cycle).
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the Developer ID cert
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

          # Allow codesign / osx-sign to use the cert without UI prompts
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make this keychain the default + part of the search list so
          # `security find-identity -v -p codesigning` discovers the cert.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[\" ]//g')
          security default-keychain -s "$KEYCHAIN_PATH"

          # Sanity check
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Publish to GitHub Releases
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple credentials are only consumed by macOS jobs; harmless to
          # set on Linux since forge.config.ts's notarytool path is gated
          # on Darwin + Developer-ID-found.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
