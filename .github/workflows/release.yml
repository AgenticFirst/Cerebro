name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Verify the pushed tag matches package.json's version. If they
      # disagree, Forge's GitHub publisher creates a release named after
      # package.json — so the artifacts ship with version X but the tag is
      # at version Y, and the in-app updater sees its own running version
      # as still "behind" forever. Fail loud instead.
      - name: Verify tag matches package.json version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: $PKG_VERSION"
          echo "git tag version:      $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION."
            echo "::error::Bump package.json before tagging, or retag at the right commit."
            exit 1
          fi

      # Linux makers need: fakeroot + dpkg (deb), rpm (rpm), mksquashfs
      # (AppImage). bundle-python.sh shells out to rsync + sha256sum (both
      # in Ubuntu's coreutils). build-essential + python3-dev cover
      # node-pty's source build (no Linux prebuild ships with the package).
      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fakeroot dpkg rpm squashfs-tools \
            build-essential python3 python3-dev rsync

      # uv (Astral's Python manager) is required by scripts/bundle-python.sh,
      # which the generateAssets hook in forge.config.ts runs to build the
      # relocatable CPython 3.11 + backend deps that ship in the .app/.deb/
      # .rpm/.AppImage. macOS GHA runners install via the same script;
      # Windows isn't covered yet (no Python backend support there).
      - name: Install uv
        if: runner.os != 'Windows'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      # appdmg's transitive native deps (fs-xattr, macos-alias) sometimes
      # ship without prebuilt binaries for arm64 macOS runners; force a
      # source rebuild so the DMG maker doesn't crash later.
      - name: Rebuild macOS DMG native deps
        if: runner.os == 'macOS'
        run: npm rebuild fs-xattr macos-alias

      - name: Publish to GitHub Releases
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
