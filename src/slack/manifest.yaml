_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Cerebro
  description: Your team's AI brain - chat with Cerebro from Slack.
  background_color: "#0B1220"
  long_description: |-
    Cerebro is a private AI assistant your team can talk to in Slack.
    Mention @Cerebro in any channel, or DM Cerebro directly, to get
    answers from your configured experts and routines.

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Cerebro
    always_online: true
  slash_commands:
    - command: /cerebro
      description: Ask Cerebro, list experts, or check status.
      usage_hint: "[help | experts | status | <question>]"
      url: https://example.com/slack/commands
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - chat:write.customize
      - commands
      - im:history
      - im:read
      - im:write
      - users:read
      - reactions:write
      - files:write

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
      - app_home_opened
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
